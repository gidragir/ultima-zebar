name: Release

on:
    push:
        branches:
            - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10
                  run_install: false

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '25.8.1'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install

            - name: Cache Turbo
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-

            - name: Create Release Pull Request or Tag
              id: changesets
              uses: changesets/action@v1
              with:
                  version: pnpm run version-packages
                  commit: 'chore(release): version packages'
                  title: 'chore(release): version packages'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Get version
              if: steps.changesets.outputs.hasChangesets == 'false'
              id: get_version
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  echo "version=v$VERSION" >> $GITHUB_OUTPUT

            - name: Build project
              if: steps.changesets.outputs.hasChangesets == 'false'
              run: pnpm run build -- --cache-dir=".turbo"

            - name: Create release folder structure
              if: steps.changesets.outputs.hasChangesets == 'false'
              run: |
                  # Update version in zpack.json based on root package.json
                  VERSION=$(node -p "require('./package.json').version")
                  jq ".version = \"$VERSION\"" zpack.json > zpack.tmp.json && mv zpack.tmp.json zpack.json
                  
                  # Create release build directory
                  mkdir -p release_build/widgets
                  cp zpack.json release_build/
                  
                  # Copy all widget dist folders
                  for dir in widgets/*; do
                      if [ -d "$dir/dist" ]; then
                          widget_name=$(basename "$dir")
                          mkdir -p "release_build/widgets/$widget_name"
                          cp -r "$dir/dist" "release_build/widgets/$widget_name/"
                      fi
                  done

            - name: Zip release folder
              if: steps.changesets.outputs.hasChangesets == 'false'
              run: |
                  cd release_build
                  zip -r ../ultima-zebar.zip *
                  cd ..

            - name: Create GitHub Release
              if: steps.changesets.outputs.hasChangesets == 'false'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.get_version.outputs.version }}
                  name: Release ${{ steps.get_version.outputs.version }}
                  files: ultima-zebar.zip
                  draft: false
                  prerelease: false
                  generate_release_notes: true
