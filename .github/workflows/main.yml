name: Release

on:
    push:
        branches:
            - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 10
                  run_install: false

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "25.8.1"
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm install

            - name: Cache Turbo
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-

            - name: Create Release Pull Request or Tag
              id: changesets
              uses: changesets/action@v1
              with:
                  version: pnpm run version-packages
                  commit: "chore(release): version packages"
                  title: "chore(release): version packages"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Get version
              if: steps.changesets.outputs.hasChangesets == 'false'
              id: get_version
              run: |
                  VERSION=$(node -p "require('./packages/config/package.json').version")
                  echo "version=v$VERSION" >> $GITHUB_OUTPUT

            - name: Lint and Format Check
              if: steps.changesets.outputs.hasChangesets == 'false'
              run: pnpm run lint && pnpm run check-format

            - name: Build project
              if: steps.changesets.outputs.hasChangesets == 'false'
              run: pnpm run build -- --cache-dir=".turbo"

            - name: Create release folder structure
              if: steps.changesets.outputs.hasChangesets == 'false'
              run: |
                  mkdir -p ultima-zebar/dist
                  cp -r dist/* ultima-zebar/dist/ 2>/dev/null || true
                  cp overline.zebar.json ultima-zebar/overline.zebar.json 2>/dev/null || true
                  cp public/release-config.json ultima-zebar/dist/config.json 2>/dev/null || true
                  rm -f ultima-zebar/dist/release-config.json

            - name: Zip release folder
              if: steps.changesets.outputs.hasChangesets == 'false'
              run: zip -r ultima-zebar.zip ultima-zebar

            - name: Create GitHub Release
              if: steps.changesets.outputs.hasChangesets == 'false'
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.get_version.outputs.version }}
                  name: Release ${{ steps.get_version.outputs.version }}
                  files: ultima-zebar.zip
                  draft: false
                  prerelease: false
                  generate_release_notes: true
